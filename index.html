<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Prompt Structuré</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="logo-container">
            <img src="Logo DCI ADIT 3" alt="Logo DCI" class="logo">
        </div>
        <div class="title-container">
            <h1 id="title">Générateur de Prompt Structuré</h1>
            <p class="version">v1</p>
        </div>
        <div class="language-selector">
            <label for="language" id="language-label">Langue:</label>
            <select id="language">
                <option value="fr">Français</option>
                <option value="en">English</option>
                <option value="ar">العربية</option>
            </select>
        </div>
    </div>

    <div class="container">
        <!-- Rôle -->
        <div class="section">
            <h2 id="role-title">1. Rôle</h2>
            <select id="role">
                <option value="">-- Sélectionner un rôle --</option>
                <option value="chef(fe) de projet">chef(fe) de projet</option>
                <option value="conseiller opérationnel et technique">conseiller opérationnel et technique</option>
                <option value="acheteur">acheteur</option>
                <option value="PMO">PMO</option>
                <option value="responsable marketing">responsable marketing</option>
                <option value="DRH">DRH</option>
                <option value="juriste">juriste</option>
                <option value="expert en">expert en</option>
            </select>
            <div class="custom-field">
                <input type="text" id="role-custom" maxlength="60" placeholder="Préciser votre domaine d'expertise (ex: cybersécurité, logistique...)" style="display: none;">
                <div class="char-counter"><span id="role-char-count">0</span>/60</div>
            </div>
        </div>

        <!-- Contexte -->
        <div class="section">
            <h2 id="contexte-title">2. Contexte</h2>
            <select id="contexte">
                <option value="">-- Sélectionner un contexte --</option>
                <option value="réunion">réunion</option>
                <option value="sourcing">sourcing</option>
                <option value="étude technique">étude technique</option>
                <option value="atelier">atelier</option>
                <option value="étude de cas">étude de cas</option>
                <option value="veille juridique">veille juridique</option>
                <option value="scénario">scénario</option>
                <option value="autre">autre</option>
            </select>
            <input type="text" id="contexte-custom" placeholder="Préciser si 'autre'" style="display: none;">
        </div>

        <!-- Objectif -->
        <div class="section">
            <h2 id="objectif-title">3. Objectif</h2>
            <select id="objectif">
                <option value="">-- Sélectionner un objectif --</option>
                <option value="rechercher">rechercher</option>
                <option value="créer">créer</option>
                <option value="clarifier">clarifier</option>
                <option value="résumer">résumer</option>
                <option value="organiser">organiser</option>
                <option value="lister">lister</option>
                <option value="former">former</option>
                <option value="élaborer">élaborer</option>
                <option value="évaluer les avantages et les inconvénients">évaluer les avantages et les inconvénients</option>
                <option value="autre">autre</option>
            </select>
            <input type="text" id="objectif-custom" placeholder="Préciser si 'autre'" style="display: none;">

            <!-- Détails supplémentaires -->
            <div class="custom-field">
                <h3 id="details-title">Détails supplémentaires (optionnel)</h3>
                <textarea id="objectif-details" maxlength="250" placeholder="Ajoutez des précisions sur l'objectif..."></textarea>
                <div class="char-counter"><span id="objectif-char-count">0</span>/250</div>
            </div>
        </div>

        <!-- Tâches -->
        <div class="section">
            <h2 id="taches-title">4. Tâches</h2>
            <select id="taches">
                <option value="">-- Sélectionner des tâches --</option>
                <option value="expliquer">expliquer</option>
                <option value="résumer">résumer</option>
                <option value="écrire">écrire</option>
                <option value="améliorer">améliorer</option>
                <option value="trouver">trouver</option>
                <option value="lister">lister</option>
                <option value="faire un tableau">faire un tableau</option>
                <option value="traduire">traduire</option>
                <option value="analyser">analyser</option>
            </select>

            <!-- Tâches personnalisées -->
            <div class="custom-field">
                <h3 id="custom-taches-title">Tâches personnalisées (optionnel)</h3>
                <textarea id="taches-custom" maxlength="250" placeholder="Ajoutez des tâches supplémentaires sous forme de liste :
1 -
2 -
3 -"></textarea>
                <div class="char-counter"><span id="taches-char-count">0</span>/250</div>
            </div>
        </div>

        <!-- Précisions -->
        <div class="section">
            <h2 id="precisions-title">5. Précisions (ton, style écrit de la réponse)</h2>
            <select id="precisions">
                <option value="">-- Sélectionner des précisions --</option>
                <option value="créatif">créatif</option>
                <option value="conventionnel">conventionnel</option>
                <option value="professionnel">professionnel</option>
                <option value="informel">informel</option>
                <option value="expert">expert</option>
                <option value="cordial">cordial</option>
                <option value="neutre">neutre</option>
                <option value="grand public">grand public</option>
            </select>
        </div>

        <!-- Livrable -->
        <div class="section">
            <h2 id="livrable-title">6. Livrable</h2>
            <select id="livrable">
                <option value="">-- Sélectionner un livrable --</option>
                <option value="tableau">tableau</option>
                <option value="liste">liste</option>
                <option value="mindmap">mindmap</option>
                <option value="rapport technique">rapport technique</option>
                <option value="mail">mail</option>
                <option value="discours">discours</option>
                <option value="post">post</option>
                <option value="processus">processus</option>
                <option value="interview">interview</option>
            </select>
        </div>

        <!-- Format -->
        <div class="section">
            <h2 id="format-title">7. Format</h2>
            <select id="format">
                <option value="">-- Sélectionner un format --</option>
                <option value="powerpoint">powerpoint</option>
                <option value="word">word</option>
                <option value="excel">excel</option>
                <option value="texte">texte</option>
                <option value="onenote">onenote</option>
                <option value="page html">page html</option>
            </select>
        </div>

        <!-- Boutons -->
        <button id="generate-btn">Générer le prompt</button>

        <!-- Résultat -->
        <div class="result">
            <h2 id="result-title">Prompt généré</h2>
            <div class="prompt-container">
                <textarea id="prompt-result" readonly placeholder="Votre prompt apparaîtra ici..."></textarea>
            </div>
            <div class="button-group">
                <button id="copy-btn">Copier</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
